project:
    name: dimi
    schema: DIMI
    repo_name: apex-bootstrap-dimi
    default_branch: main
    test_sync_branch: test-sync-base
    apex_workspace: DIMI
    apex_app_ids: []
paths:
    project_repo: .
    apex_bootstrap_cli: ../apex-bootstrap-cli/apex-bootstrap
    uc_local_apex_dev_repo: ../uc-local-apex-dev
    local_instances_root: ../uc-local-instances
tools:
    git: git
    github: gh
    docker: docker
    ssh: ssh
    go: go
    npx: npx
sqlcl:
    command: sql
    version_manager: sqlv
    setup_version: 25.3.2.317.1117
    project_version: 26.1.0.086.1709
connections:
    dev:
        sqlcl: ${DEV_SQLCL}
        admin_sqlcl: ${DEV_ADMIN_SQLCL}
        host: 94.130.168.67
        ssh_user: root
        ssh_key: ~/.ssh/id_rsa
        pdb: FREEPDB1
    test:
        sqlcl: ${TEST_SQLCL}
        admin_sqlcl: ${TEST_ADMIN_SQLCL}
        host: 94.130.168.58
        ssh_user: root
        ssh_key: ~/.ssh/id_rsa
        pdb: FREEPDB1
    validation:
        sqlcl: ${VALIDATION_SQLCL}
        admin_sqlcl: ${DEV_ADMIN_SQLCL}
        host: 94.130.168.67
        ssh_user: root
        ssh_key: ~/.ssh/id_rsa
        pdb: FREEPDB1
local:
    default_shared_dev: shared-dev
    default_shared_test: shared-test
    default_personal: personal-dev
    instances:
        personal-dev:
            path: ../uc-local-instances/personal-dev
            schema: DIMI
            workspace: DIMI
        shared-dev:
            path: ../uc-local-instances/shared-dev
            schema: DIMI
            workspace: DIMI
        shared-test:
            path: ../uc-local-instances/shared-test
            schema: DIMI
            workspace: DIMI
data:
    mode: uc-local-copy
    source_instance: shared-dev
    target_instance: personal-dev
    refresh_command: []
pdb:
    branch_admin_connection: ${DEV_ADMIN_SQLCL}
    validation_admin_connection: ${DEV_ADMIN_SQLCL}
    source_pdb: FREEPDB1
    branch_prefix: BR_
    validation_prefix: VAL_
    clone_sql_template: |-
        create pluggable database {{ .TargetPDB }} from {{ .SourcePDB }} file_name_convert = (
            '/FREEPDB1/', '/{{ .TargetPDB }}/',
            '/opt/oracle/product/26ai/dbhomeFree/dbs/audit01.dbf', '/opt/oracle/oradata/FREE/{{ .TargetPDB }}/audit01.dbf',
            '/opt/oracle/product/26ai/dbhomeFree/dbs/tbs_apex.dbf', '/opt/oracle/oradata/FREE/{{ .TargetPDB }}/tbs_apex.dbf',
            '/opt/oracle/product/26ai/dbhomeFree/dbs/tbs_dimi.dat', '/opt/oracle/oradata/FREE/{{ .TargetPDB }}/tbs_dimi.dat'
        );
        alter pluggable database {{ .TargetPDB }} open read write;
    drop_sql_template: |-
        alter pluggable database {{ .TargetPDB }} close immediate;
        drop pluggable database {{ .TargetPDB }} including datafiles;
validation:
    source_connection: ${DEV_SQLCL}
    target_connection: ${VALIDATION_SQLCL}
    prepare_command:
        - ./scripts/validation/prepare_validation_env.sh
    cleanup_command:
        - ./scripts/validation/cleanup_validation_env.sh
    utplsql_command:
        - ./scripts/validation/run_utplsql.sh
    playwright_command:
        - ./scripts/validation/run_playwright.sh
    playwright_base_url: http://94.130.168.67:8182/ords/
jenkins:
    file: Jenkinsfile
    promote_command:
        - ./scripts/workflow/promote-dev.sh
    artifact_command:
        - ./scripts/workflow/release-artifact.sh
    deploy_command:
        - ./scripts/workflow/deploy-test.sh
